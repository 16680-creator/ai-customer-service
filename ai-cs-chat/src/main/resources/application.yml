server:
  port: 8083

spring:
  application:
    name: ai-cs-chat
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:sk-placeholder}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-3.5-turbo}
          temperature: 0.7
          max-tokens: 2048
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
        namespace: aics
        group: DEFAULT_GROUP
      config:
        server-addr: 127.0.0.1:8848
        namespace: aics
        group: DEFAULT_GROUP
        file-extension: yml

logging:
  level:
    com.aics.chat: debug
    org.springframework.ai: info
