server:
  port: 8084

spring:
  application:
    name: ai-cs-search
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:aics}
        group: DEFAULT_GROUP
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NAMESPACE:aics}
        group: DEFAULT_GROUP
        file-extension: yml

logging:
  level:
    com.aics.search: debug
