version: '3.8'

# ============================================================
# Host 2 部署清单
# - MySQL Slave1 (3306)
# - Redis Node2 (6379)
# - Knowledge Service (8082)
# - AI Chat Service (8083)
# - Search Service (8084)
# ============================================================

services:
  # ==================== MySQL 从库1 ====================
  mysql-slave1:
    image: mysql:8.0
    container_name: aics-mysql-slave1
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Shanghai
    volumes:
      - mysql-slave1-data:/var/lib/mysql
      - ./mysql/slave.cnf:/etc/mysql/conf.d/slave.cnf
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aics-network

  # ==================== Redis 节点2 ====================
  redis-node2:
    image: redis:7
    container_name: aics-redis-node2
    restart: always
    ports:
      - "6379:6379"
      - "16379:16379"
    volumes:
      - redis-node2-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aics-network

  # ==================== 知识库服务 ====================
  knowledge-service:
    image: ${REGISTRY:-aics}/ai-cs-knowledge:${VERSION:-latest}
    container_name: aics-knowledge-service
    restart: always
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER: ${HOST1_IP}:8848
      DB_HOST: mysql-slave1
      MINIO_ENDPOINT: http://${HOST1_IP}:9000
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - aics-network

  # ==================== AI 对话服务 ====================
  ai-chat-service:
    image: ${REGISTRY:-aics}/ai-cs-chat:${VERSION:-latest}
    container_name: aics-chat-service
    restart: always
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER: ${HOST1_IP}:8848
      OPENAI_API_KEY: ${OPENAI_API_KEY:-demo-key}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-http://host.docker.internal:11434/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-qwen2.5:7b}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - aics-network

  # ==================== 搜索服务 ====================
  search-service:
    image: ${REGISTRY:-aics}/ai-cs-search:${VERSION:-latest}
    container_name: aics-search-service
    restart: always
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER: ${HOST1_IP}:8848
      ES_HOST: ${HOST3_IP}:9200
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - aics-network

networks:
  aics-network:
    driver: bridge

volumes:
  mysql-slave1-data:
  redis-node2-data: