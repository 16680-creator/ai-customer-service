version: '3.8'

# ============================================================
# Host 3 部署清单
# - MySQL Slave2 (3306)
# - Redis Node3 (6379)
# - Elasticsearch (9200)
# - RocketMQ NameServer (9876)
# - RocketMQ Broker (10911/10909)
# - Message Service (8085)
# - Notify Service (8086)
# ============================================================

services:
  # ==================== MySQL 从库2 ====================
  mysql-slave2:
    image: mysql:8.0
    container_name: aics-mysql-slave2
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      TZ: Asia/Shanghai
    volumes:
      - mysql-slave2-data:/var/lib/mysql
      - ./mysql/slave2.cnf:/etc/mysql/conf.d/slave.cnf
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - aics-network

  # ==================== Redis 节点3 ====================
  redis-node3:
    image: redis:7
    container_name: aics-redis-node3
    restart: always
    ports:
      - "6379:6379"
      - "16379:16379"
    volumes:
      - redis-node3-data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aics-network

  # ==================== Elasticsearch ====================
  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: aics-elasticsearch
    restart: always
    ports:
      - "9200:9200"
      - "9300:9300"
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
      xpack.security.enrollment.enabled: "false"
      network.host: 0.0.0.0
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q green"]
      interval: 20s
      timeout: 10s
      retries: 20
      start_period: 60s
    networks:
      - aics-network

  # ==================== RocketMQ NameServer ====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.4
    container_name: aics-rocketmq-namesrv
    restart: always
    ports:
      - "9876:9876"
    environment:
      JAVA_OPT_EXT: "-Xms256m -Xmx256m"
    command: sh mqnamesrv
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9876/ > /dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
    networks:
      - aics-network

  # ==================== RocketMQ Broker ====================
  rocketmq-broker:
    image: apache/rocketmq:5.1.4
    container_name: aics-rocketmq-broker
    restart: always
    ports:
      - "10909:10909"
      - "10911:10911"
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
      JAVA_OPT_EXT: "-Xms512m -Xmx512m"
    command: sh mqbroker -n rocketmq-namesrv:9876
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - aics-network

  # ==================== 消息服务 ====================
  message-service:
    image: ai-cs-message:${VERSION:-latest}
    container_name: aics-message-service
    restart: always
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER: ${HOST1_IP}:8848
      DB_HOST: mysql-slave2
      ROCKETMQ_NAMESRV: rocketmq-namesrv:9876
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      rocketmq-namesrv:
        condition: service_healthy
    networks:
      - aics-network

  # ==================== 通知服务 ====================
  notify-service:
    image: ai-cs-notify:${VERSION:-latest}
    container_name: aics-notify-service
    restart: always
    ports:
      - "8086:8086"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      NACOS_SERVER: ${HOST1_IP}:8848
      JAVA_OPTS: "-Xms256m -Xmx512m"
    networks:
      - aics-network

networks:
  aics-network:
    driver: bridge

volumes:
  mysql-slave2-data:
  redis-node3-data:
  es-data: