# AI对话服务部署
apiVersion: v1
kind: Service
metadata:
  name: ai-chat-service
  namespace: ai-customer-service
  labels:
    app: ai-chat-service
spec:
  type: ClusterIP
  ports:
    - port: 8083
      targetPort: 8083
      name: http
  selector:
    app: ai-chat-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chat-service
  namespace: ai-customer-service
  labels:
    app: ai-chat-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-chat-service
  template:
    metadata:
      labels:
        app: ai-chat-service
    spec:
      containers:
        - name: ai-chat-service
          image: 192.168.56.12:5000/aics/ai-chat-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
              name: http
          env:
            - name: NACOS_ADDR
              value: "nacos:8848"
            - name: NACOS_NAMESPACE
              value: ""
            - name: MYSQL_HOST
              value: "mysql-master"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DB
              value: "chat_db"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_PASSWORD
              value: "root"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aics-secrets
                  key: openai-api-key
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: aics-secrets
                  key: openai-base-url
                  optional: true
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: aics-secrets
                  key: openai-model
                  optional: true
            - name: JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
          livenessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8083
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
