# 知识库服务部署
apiVersion: v1
kind: Service
metadata:
  name: knowledge-service
  namespace: ai-customer-service
  labels:
    app: knowledge-service
spec:
  type: ClusterIP
  ports:
    - port: 8082
      targetPort: 8082
      name: http
  selector:
    app: knowledge-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-service
  namespace: ai-customer-service
  labels:
    app: knowledge-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-service
  template:
    metadata:
      labels:
        app: knowledge-service
    spec:
      containers:
        - name: knowledge-service
          image: 192.168.56.12:5000/aics/knowledge-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8082
              name: http
          env:
            - name: NACOS_ADDR
              value: "nacos:8848"
            - name: NACOS_NAMESPACE
              value: ""
            - name: MYSQL_HOST
              value: "mysql-master"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DB
              value: "knowledge_db"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_PASSWORD
              value: "root"
            - name: MINIO_ENDPOINT
              value: "minio:9000"
            - name: MINIO_ACCESS_KEY
              value: "minioadmin"
            - name: MINIO_SECRET_KEY
              value: "minioadmin"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
