# 消息服务部署
apiVersion: v1
kind: Service
metadata:
  name: message-service
  namespace: ai-customer-service
  labels:
    app: message-service
spec:
  type: ClusterIP
  ports:
    - port: 8085
      targetPort: 8085
      name: http
  selector:
    app: message-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: message-service
  namespace: ai-customer-service
  labels:
    app: message-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: message-service
  template:
    metadata:
      labels:
        app: message-service
    spec:
      containers:
        - name: message-service
          image: 192.168.56.12:5000/aics/message-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
              name: http
          env:
            - name: NACOS_ADDR
              value: "nacos:8848"
            - name: NACOS_NAMESPACE
              value: ""
            - name: MYSQL_HOST
              value: "mysql-master"
            - name: MYSQL_PORT
              value: "3306"
            - name: MYSQL_DB
              value: "chat_db"
            - name: MYSQL_USER
              value: "root"
            - name: MYSQL_PASSWORD
              value: "root"
            - name: ROCKETMQ_NAMESRV
              value: "rocketmq-namesrv:9876"
            - name: REDIS_HOST
              value: "redis"
            - name: REDIS_PORT
              value: "6379"
            - name: JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8085
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
