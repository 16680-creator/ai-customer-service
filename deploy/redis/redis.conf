# Redis 单节点配置
# ====================

# 绑定地址
bind 0.0.0.0

# 端口
port 6379

# 密码（生产环境建议开启）
# requirepass aics_redis_2024

# 持久化配置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# RDB快照配置
save 900 1
save 300 10
save 60 10000

# 内存配置
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志配置
loglevel notice

# 客户端连接数
maxclients 10000

# TCP配置
tcp-keepalive 300
timeout 0

# 慢查询日志
slowlog-log-slower-than 10000
slowlog-max-len 128
